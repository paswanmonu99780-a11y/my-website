<!DOCTYPE html>
<html>
<head>
    <title>Meri Stylish Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome Meri Website 😎</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="box">
        <h2>Hello Bhai 👋</h2>
        <p>Yeh meri stylish website hai 🔥</p>
        <button onclick="showMessage()">Click Me</button>
    </div>
</div>

<script>
    function showMessage() {
        alert("Welcome to my website 🚀");
    }
</script>

</body>
</html>
