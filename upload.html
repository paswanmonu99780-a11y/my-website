<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Model - RenderRealm</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #020617;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

nav a:hover {
    color: cyan;
}

/* FORM */
.container {
    max-width: 500px;
    margin: 50px auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: #020617;
    color: white;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: cyan;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h3>RenderRealm</h3>
    <div>
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<!-- ✅ NEW UPLOAD FORM -->
<div class="container">
    <h2>Upload 3D Model</h2>

    <form id="uploadForm">
        <input type="text" name="name" placeholder="Model Name" required>
        <input type="number" name="price" placeholder="Price ₹" required>

        <input type="file" name="image" accept="image/*" required>
        <input type="file" name="model" accept=".glb,.gltf" required>

        <button type="submit">Upload Model</button>
    </form>
</div>

<!-- ✅ NEW SCRIPT -->
<script>
document.getElementById("uploadForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  let res = await fetch("http://localhost:5000/upload", {
    method: "POST",
    body: formData
  });

  let data = await res.text();
  alert(data);
});
</script>

</body>
</html>
