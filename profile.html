<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - RenderRealm</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #020617;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

nav a:hover {
    color: cyan;
}

/* PROFILE */
.profile {
    text-align: center;
    padding: 40px;
}

.profile img {
    width: 120px;
    border-radius: 50%;
}

.profile h2 {
    margin-top: 10px;
}

/* STATS */
.stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
}

.box {
    background: #1e293b;
    padding: 15px 25px;
    border-radius: 10px;
    text-align: center;
}

/* MODELS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 8px;
    background: cyan;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h3>RenderRealm</h3>
    <div>
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="upload.html">Upload</a>
        <a href="login.html">Logout</a>
    </div>
</nav>

<!-- PROFILE -->
<div class="profile">
    <img src="https://via.placeholder.com/120">
    <h2>Creator Name</h2>
    <p>@username</p>
</div>

<!-- STATS -->
<div class="stats">
    <div class="box">
        <h3>10</h3>
        <p>Models</p>
    </div>
    <div class="box">
        <h3>₹5000</h3>
        <p>Earnings</p>
    </div>
</div>

<!-- USER MODELS -->
<h2 style="text-align:center;">Your Models</h2>

<div class="grid">

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Car Model</h3>
        <button>Delete</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Character</h3>
        <button>Delete</button>
    </div>

</div>

<script>
function deleteModel() {
    alert(\"Model Deleted ❌\");
}
</script>

</body>
</html>
