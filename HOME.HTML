<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenderRealm.art</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
}

/* NAVBAR */
nav {

    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(2,6,23,0.8);
    backdrop-filter: blur(10px);
    align-items: center;
    position: sticky;
    top: 0;
}

nav h1 {
    color: cyan;
    letter-spacing: 2px;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: cyan;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h2 {
    font-size: 48px;
    margin-bottom: 10px;
}

.hero p {
    color: #94a3b8;
    margin-bottom: 20px;
}

.hero button {
    padding: 12px 25px;
    background: linear-gradient(45deg, cyan, purple);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    font-size: 16px;
}

/* SEARCH */
.search-box {
    text-align: center;
    margin: 30px;
}

.search-box input {
    width: 50%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    background: #1e293b;
    color: white;
}

/* PRODUCTS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 25px;
    padding: 30px;
}

.card {
    background: linear-gradient(180deg,#1e293b,#020617);
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    margin-top: 10px;
}

.price {
    color: cyan;
    font-weight: bold;
}

.buy-btn {
    display: block;
    margin-top: 10px;
    padding: 8px;
    background: cyan;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
    color: #94a3b8;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h1>RenderRealm.art</h1>
    <div>
        
        <a href="index.html">Home</a>
<a href="explore.html">Explore</a>
<a href="upload.html">Upload</a>
<a href="profile.html">Profile</a>
<a href="login.html">Login</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h2>Buy & Sell 3D Models Easily</h2>
    <p>Join the next-gen 3D marketplace 🚀</p>
    <button onclick="start()">Get Started</button>
</section>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" placeholder="Search 3D models...">
</div>

<!-- PRODUCTS -->
<section class="grid">

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>3D Car Model</h3>
        <p class="price">₹500</p>
        <button class="buy-btn" onclick="buy('Car Model',500)">Buy</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Character Model</h3>
        <p class="price">₹800</p>
        <button class="buy-btn" onclick="buy('Character',800)">Buy</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Game Asset Pack</h3>
        <p class="price">₹1200</p>
        <button class="buy-btn" onclick="buy('Asset Pack',1200)">Buy</button>
    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 RenderRealm.art | All Rights Reserved</p>
</footer>

<script>
function start() {
    alert("Welcome to RenderRealm 🚀");
}

function buy(name, price) {
    let commission = price * 0.2;
    let creator = price - commission;

    alert(
        "Purchased: " + name + "\n" +
        "Price: ₹" + price + "\n" +
        "Your Commission: ₹" + commission + "\n" +
        "Creator Gets: ₹" + creator
    );
}
</script>

</body>
</html>
