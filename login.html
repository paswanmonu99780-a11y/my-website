<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenderRealm - Auth</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 350px;
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
    background: #020617;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(45deg, cyan, purple);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.toggle {
    text-align: center;
    margin-top: 15px;
    cursor: pointer;
    color: cyan;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginForm">
        <h2>Login</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div class="toggle" onclick="toggleForm()">Don't have an account? Sign up</div>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="hidden">
        <h2>Sign Up</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button onclick="signup()">Create Account</button>
        <div class="toggle" onclick="toggleForm()">Already have an account? Login</div>
    </div>

</div>

<script>
function toggleForm() {
    document.getElementById("loginForm").classList.toggle("hidden");
    document.getElementById("signupForm").classList.toggle("hidden");
}

function login() {
    alert("Login Successful 🚀");
}

function signup() {
    alert("Account Created ✅");
}
</script>

</body>
</html>
